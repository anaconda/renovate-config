name: Sync to other orgs
on:
  push:
    branches:
      - main

env:
  DOWNSTREAM_REPOS: anaconda-distribution/renovate-config pyscript/renovate-config pythonanywhere/renovate-config

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out renovate-config
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.ANACONDA_BOT_TOKEN }}

      - name: Update downstream repositories
        shell: bash
        run: |
          for repo in $DOWNSTREAM_REPOS; do
            git remote add "$repo" "git@github.com:${repo}.git"
            git push "$repo" main
          done
